<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>eFootball Turnir</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #0a0d16;
    --card: #131826;
    --card-border: #232a3d;
    --text: #f2f4f8;
    --muted: #8891a7;
    --accent1: #6a5cf9;
    --accent2: #22d3ee;
    --danger: #ff4d6d;
    --success: #22c55e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 90px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 10px;
  }
  header .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 20px; letter-spacing: 0.5px; }
  header .brand .ball { font-size: 22px; }
  .screen { padding: 0 16px; animation: fadein .25s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px);} to { opacity:1; transform:none; } }

  .section-label {
    text-transform: uppercase; letter-spacing: 2px; font-size: 11px;
    color: var(--muted); margin: 22px 4px 10px; display:flex; align-items:center; gap:8px;
  }
  .section-label::after { content:""; flex:1; height:1px; background: var(--card-border); }

  .league-card {
    position: relative;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 14px;
    border: 1px solid var(--card-border);
    background: var(--card);
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s ease, border-color .15s ease;
  }
  .league-card:active { transform: scale(0.98); }
  .league-card .glow {
    position: absolute; inset: 0; opacity: .18; pointer-events:none;
  }
  .league-card .row { display:flex; align-items:center; justify-content:space-between; position:relative; }
  .league-card .icon-badge {
    width: 46px; height:46px; border-radius: 14px; display:flex; align-items:center; justify-content:center;
    font-size: 22px; background: rgba(255,255,255,0.06); border: 1px solid var(--card-border);
  }
  .league-card .name { font-size: 19px; font-weight: 800; margin: 2px 0 4px; }
  .league-card .meta { font-size: 13px; color: var(--muted); }
  .badge {
    font-size: 11px; font-weight: 700; padding: 5px 10px; border-radius: 999px;
    border: 1px solid var(--danger); color: var(--danger); white-space: nowrap;
  }
  .badge.open { border-color: var(--success); color: var(--success); }
  .progress-track { height: 6px; border-radius: 999px; background: rgba(255,255,255,0.06); margin-top: 12px; overflow:hidden; }
  .progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent1), var(--accent2)); }

  .btn {
    display:block; width:100%; text-align:center; padding: 14px; border-radius: 14px;
    border: none; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px;
  }
  .btn-primary { background: linear-gradient(90deg, var(--accent1), var(--accent2)); color: #0a0d16; }
  .btn-outline { background: transparent; border: 1px solid var(--card-border); color: var(--text); }
  .btn:disabled { opacity: .5; }

  .topbar {
    display:flex; align-items:center; gap:12px; padding: 16px;
  }
  .back { font-size: 22px; color: var(--text); background:none; border:none; cursor:pointer; }
  .hero {
    border-radius: 20px; padding: 22px; margin: 0 16px 18px;
    border: 1px solid var(--card-border);
  }
  .hero .big-icon { font-size: 40px; }
  .hero h1 { font-size: 26px; margin: 8px 0 4px; }
  .stat-row { display:flex; gap: 10px; margin-top: 16px; }
  .stat { flex:1; background: rgba(255,255,255,0.05); border-radius: 14px; padding: 12px; text-align:center; }
  .stat b { display:block; font-size: 22px; }
  .stat span { font-size: 11px; color: var(--muted); text-transform: uppercase; }

  .tabs { display:flex; gap: 8px; padding: 0 16px 14px; }
  .tab { flex:1; text-align:center; padding: 10px; border-radius: 12px; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; border:1px solid var(--card-border); }
  .tab.active { color:#0a0d16; background: linear-gradient(90deg, var(--accent1), var(--accent2)); border:none; }

  table.std { width:100%; border-collapse: collapse; font-size: 13px; }
  table.std th { color: var(--muted); font-weight:600; text-align:center; padding: 8px 4px; font-size: 11px; }
  table.std td { text-align:center; padding: 9px 4px; border-top: 1px solid var(--card-border); }
  table.std td.name { text-align:left; font-weight:600; }
  table.std td.pts { font-weight: 800; color: var(--accent2); }

  .match-row {
    display:flex; align-items:center; justify-content:space-between;
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; font-size: 14px;
  }
  .match-row .p { flex:1; }
  .match-row .p.right { text-align:right; }
  .match-row .score { font-weight:800; padding: 4px 10px; border-radius: 10px; background: rgba(255,255,255,0.06); margin: 0 10px; min-width: 54px; text-align:center; }
  .round-nav { display:flex; align-items:center; justify-content:space-between; padding: 4px 4px 14px; }
  .round-nav button { background: var(--card); border: 1px solid var(--card-border); color: var(--text); border-radius: 10px; padding: 8px 14px; }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,13,22,0.92); backdrop-filter: blur(10px);
    border-top: 1px solid var(--card-border);
    display:flex; padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    gap: 6px;
  }
  .nav-item { flex:1; text-align:center; color: var(--muted); font-size: 11px; padding: 8px 0; border-radius: 12px; cursor:pointer; }
  .nav-item.active { color: var(--text); background: rgba(255,255,255,0.06); }
  .nav-item .emoji { display:block; font-size: 18px; margin-bottom: 2px; }

  .toast {
    position: fixed; top: 16px; left: 16px; right: 16px; z-index: 999;
    background: var(--card); border: 1px solid var(--card-border); border-radius: 14px;
    padding: 14px 16px; text-align:center; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.4);
    animation: fadein .2s ease;
  }
  .empty { text-align:center; color: var(--muted); padding: 40px 20px; font-size: 14px; }

  .admin-panel { background: rgba(255,77,109,0.06); border: 1px solid var(--danger); border-radius: 14px; padding: 14px; margin-bottom: 16px; }
  .admin-panel h3 { margin: 0 0 10px; font-size: 13px; color: var(--danger); text-transform: uppercase; letter-spacing: 1px; }
  .result-form { display:flex; gap: 6px; margin-top: 6px; }
  .result-form input { width: 46px; text-align:center; background: var(--bg); border: 1px solid var(--card-border); color: var(--text); border-radius: 8px; padding: 8px 4px; }
  .result-form button { background: var(--accent2); border:none; border-radius: 8px; padding: 8px 12px; font-weight:700; color:#0a0d16; }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="ball">⚽</span> eFOOTBALL TURNIR</div>
</header>

<div id="app"></div>

<div class="bottom-nav">
  <div class="nav-item active" data-nav="home"><span class="emoji">🏠</span>Asosiy</div>
  <div class="nav-item" data-nav="profile"><span class="emoji">👤</span>Profil</div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const initData = tg?.initData || "";
const tgUser = tg?.initDataUnsafe?.user || { id: 0, first_name: "Mehmon" };

// Backend shu domenda joylashadi (frontend va backend bir joyda serve qilinsa nisbiy yo'l ishlaydi)
const API = "";

const app = document.getElementById("app");
let currentLeagueId = null;
let currentRound = 1;

function showToast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

async function api(path, options = {}) {
  const res = await fetch(API + path, {
    ...options,
    headers: { "Content-Type": "application/json", ...(options.headers || {}) },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: "Xatolik" }));
    throw new Error(err.detail || "Xatolik yuz berdi");
  }
  return res.json();
}

// ---------------- HOME: liga ro'yxati ----------------
async function renderHome() {
  app.innerHTML = `<div class="screen"><div class="section-label">Liga tanlash</div><div id="league-list"></div></div>`;
  const listEl = document.getElementById("league-list");
  listEl.innerHTML = `<div class="empty">Yuklanmoqda...</div>`;

  try {
    const leagues = await api("/api/leagues");
    if (!leagues.length) {
      listEl.innerHTML = `<div class="empty">Hozircha liga yo'q</div>`;
      return;
    }
    listEl.innerHTML = leagues.map(lg => leagueCardHtml(lg)).join("");
    leagues.forEach(lg => {
      document.getElementById("card-" + lg.id).addEventListener("click", () => renderLeague(lg.id));
    });
  } catch (e) {
    listEl.innerHTML = `<div class="empty">Xatolik: ${e.message}</div>`;
  }
}

function leagueCardHtml(lg) {
  const pct = Math.min(100, Math.round((lg.count / lg.capacity) * 100));
  const statusLabel = lg.full ? "TO'LIQ" : (lg.status === "started" ? "BOSHLANDI" : "OCHIQ");
  const badgeClass = lg.full || lg.status === "started" ? "" : "open";
  return `
    <div class="league-card" id="card-${lg.id}" style="background: linear-gradient(135deg, ${lg.color1}22, ${lg.color2}33), var(--card);">
      <div class="row">
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="icon-badge">${lg.icon}</div>
          <div>
            <div class="name">${lg.name}</div>
            <div class="meta">${lg.count}/${lg.capacity} o'yinchi</div>
          </div>
        </div>
        <div class="badge ${badgeClass}">${statusLabel}</div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
  `;
}

// ---------------- LEAGUE DETAIL ----------------
async function renderLeague(id) {
  currentLeagueId = id;
  currentRound = 1;
  app.innerHTML = `
    <div class="topbar">
      <button class="back" id="back-btn">←</button>
    </div>
    <div id="hero-area"></div>
    <div class="tabs">
      <div class="tab active" data-tab="fixtures">Jadval</div>
      <div class="tab" data-tab="standings">Reyting</div>
    </div>
    <div class="screen" id="tab-content"></div>
  `;
  document.getElementById("back-btn").addEventListener("click", renderHome);

  const lg = await api(`/api/leagues/${id}?init_data=${encodeURIComponent(initData)}`);
  document.getElementById("hero-area").innerHTML = heroHtml(lg);

  const registerBtn = document.getElementById("register-btn");
  if (registerBtn) {
    registerBtn.addEventListener("click", async () => {
      try {
        const r = await api(`/api/leagues/${id}/register`, {
          method: "POST",
          body: JSON.stringify({ init_data: initData }),
        });
        showToast(r.message);
        renderLeague(id);
      } catch (e) {
        showToast(e.message);
      }
    });
  }

  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      if (tab.dataset.tab === "fixtures") renderFixtures(id, lg.is_admin);
      else renderStandings(id);
    });
  });

  renderFixtures(id, lg.is_admin);
}

function heroHtml(lg) {
  const pct = Math.min(100, Math.round((lg.count / lg.capacity) * 100));
  let actionHtml = "";
  if (lg.is_registered) {
    actionHtml = `<button class="btn btn-outline" disabled>✅ Siz ro'yxatdasiz</button>`;
  } else if (lg.full || lg.status !== "reg") {
    actionHtml = `<button class="btn btn-outline" disabled>Ro'yxatga olish yopiq</button>`;
  } else {
    actionHtml = `<button class="btn btn-primary" id="register-btn">Ro'yxatdan o'tish</button>`;
  }

  let adminHtml = "";
  if (lg.is_admin && lg.status === "reg") {
    adminHtml = `<button class="btn btn-outline" id="start-btn">🚀 Turnirni boshlash (jadval yaratish)</button>`;
  }

  return `
    <div class="hero" style="background: linear-gradient(135deg, ${lg.color1}33, ${lg.color2}44);">
      <div class="big-icon">${lg.icon}</div>
      <h1>${lg.name}</h1>
      <div class="meta" style="color:var(--muted); font-size:13px;">${lg.count}/${lg.capacity} o'yinchi ro'yxatdan o'tgan</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="stat-row">
        <div class="stat"><b>${lg.count}</b><span>O'yinchi</span></div>
        <div class="stat"><b>${lg.capacity}</b><span>Maksimal</span></div>
        <div class="stat"><b>${lg.status === "reg" ? "Ochiq" : "Boshlandi"}</b><span>Holat</span></div>
      </div>
      ${actionHtml}
      ${adminHtml}
    </div>
  `;
}

// ---------------- FIXTURES ----------------
async function renderFixtures(id, isAdmin) {
  const content = document.getElementById("tab-content");
  content.innerHTML = `<div class="empty">Yuklanmoqda...</div>`;

  try {
    const data = await api(`/api/leagues/${id}/fixtures?round=${currentRound}`);
    if (data.max_round === 0) {
      content.innerHTML = `<div class="empty">Turnir hali boshlanmagan.<br>Admin "Turnirni boshlash" tugmasini bosishi kerak.</div>`;
      return;
    }
    const matches = data.matches.map(m => matchRowHtml(m, isAdmin)).join("");
    content.innerHTML = `
      <div class="round-nav">
        <button id="prev-round">← Oldingi</button>
        <b>${currentRound}-tur / ${data.max_round}</b>
        <button id="next-round">Keyingi →</button>
      </div>
      ${matches || '<div class="empty">Bu turda o\'yin yo\'q</div>'}
    `;
    document.getElementById("prev-round").addEventListener("click", () => {
      if (currentRound > 1) { currentRound--; renderFixtures(id, isAdmin); }
    });
    document.getElementById("next-round").addEventListener("click", () => {
      if (currentRound < data.max_round) { currentRound++; renderFixtures(id, isAdmin); }
    });

    if (isAdmin) {
      document.querySelectorAll(".save-result").forEach(btn => {
        btn.addEventListener("click", async () => {
          const matchId = btn.dataset.id;
          const s1 = document.getElementById("s1-" + matchId).value;
          const s2 = document.getElementById("s2-" + matchId).value;
          if (s1 === "" || s2 === "") { showToast("Hisobni kiriting"); return; }
          try {
            await api(`/api/leagues/${id}/result`, {
              method: "POST",
              body: JSON.stringify({ init_data: initData, match_id: Number(matchId), score1: Number(s1), score2: Number(s2) }),
            });
            showToast("Natija saqlandi ✅");
            renderFixtures(id, isAdmin);
          } catch (e) {
            showToast(e.message);
          }
        });
      });
    }
  } catch (e) {
    content.innerHTML = `<div class="empty">Xatolik: ${e.message}</div>`;
  }
}

function matchRowHtml(m, isAdmin) {
  const scoreHtml = m.played
    ? `<div class="score">${m.score1} : ${m.score2}</div>`
    : (isAdmin
        ? `<div class="result-form">
             <input type="number" id="s1-${m.id}" min="0">
             <span>:</span>
             <input type="number" id="s2-${m.id}" min="0">
             <button class="save-result" data-id="${m.id}">✓</button>
           </div>`
        : `<div class="score">vs</div>`);
  return `
    <div class="match-row">
      <div class="p">${m.n1}</div>
      ${scoreHtml}
      <div class="p right">${m.n2}</div>
    </div>
  `;
}

// ---------------- STANDINGS ----------------
async function renderStandings(id) {
  const content = document.getElementById("tab-content");
  content.innerHTML = `<div class="empty">Yuklanmoqda...</div>`;
  try {
    const table = await api(`/api/leagues/${id}/standings`);
    if (!table.length) {
      content.innerHTML = `<div class="empty">Hali o'yinchilar yo'q</div>`;
      return;
    }
    const rows = table.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td class="name">${r.name}</td>
        <td>${r.P}</td><td>${r.W}</td><td>${r.D}</td><td>${r.L}</td>
        <td>${r.GD}</td><td class="pts">${r.PTS}</td>
      </tr>
    `).join("");
    content.innerHTML = `
      <table class="std">
        <thead><tr><th>#</th><th style="text-align:left">Ism</th><th>O</th><th>G</th><th>D</th><th>M</th><th>GD</th><th>Ochko</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch (e) {
    content.innerHTML = `<div class="empty">Xatolik: ${e.message}</div>`;
  }
}

// ---------------- PROFILE ----------------
function renderProfile() {
  app.innerHTML = `
    <div class="screen">
      <div class="section-label">Profil</div>
      <div class="league-card">
        <div class="row">
          <div>
            <div class="name">${tgUser.first_name || "Mehmon"}</div>
            <div class="meta">@${tgUser.username || "—"} · ID: ${tgUser.id}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

document.querySelectorAll(".nav-item").forEach(item => {
  item.addEventListener("click", () => {
    document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
    item.classList.add("active");
    if (item.dataset.nav === "home") renderHome();
    else renderProfile();
  });
});

renderHome();
</script>
</body>
</html>
